name: 'Webifier Build'
description: 'GitHub Action to build a static website and deploy on github pages'
author: 'webifier'
branding:
  color: 'blue'
  icon: 'cloud'

inputs:
  repo:
    description: 'GitHub repository of website material (default: $GITHUB_REPOSITORY)'
    default: ${{ github.repository }}
    required: false
  baseurl:
    description: >
      Base URL (slug) of website (default: name of repository). You should set this field to "" if you are using
      Webifier for building a github.io repository itself (in a `<username/organization>.github.io` repository ).
    default: ${{ github.event.repository.name }}
    required: false
  index:
    description: >
      Entry index file (default: index.yml) change this if your entry index file is not named "index.yml" or is not
      located in the root of your repository.
    default: 'index.yml'
    required: false
  templates_dir:
    description: >
      Base directory to lookup custom jinja2 templates in (default: ".").
    default: "."
    required: false
  publish_dir:
    description: >
      Where should the webified results end up (default: "./webified/")
    default: "./webified/"
    required: false
  python-version:
    description: >
      Python version used to install and run Webifier.
    default: "3.13"
    required: false
  extra-packages:
    description: >
      Additional pip packages to install before rendering, such as third-party Webifier extensions.
      Use one package requirement per line, for example "my-webifier-extension" or
      "my-extension @ git+https://github.com/me/my-extension.git".
    default: ""
    required: false
runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
    - run: python -m pip install --upgrade pip
      shell: bash
    - run: python -m pip install --upgrade "webifier-extensions @ git+https://github.com/webifier/extensions.git" "webifier @ git+https://github.com/webifier/build.git"
      shell: bash
    - if: ${{ inputs.extra-packages != '' }}
      env:
        WEBIFIER_EXTRA_PACKAGES: ${{ inputs.extra-packages }}
      run: |
        python - <<'PY'
        import os
        import subprocess
        import sys

        packages = [
            line.strip()
            for line in os.environ["WEBIFIER_EXTRA_PACKAGES"].splitlines()
            if line.strip()
        ]
        subprocess.check_call([sys.executable, "-m", "pip", "install", "--upgrade", *packages])
        PY
      shell: bash
    - run: webify --repo-full-name "${{ inputs.repo }}" --baseurl "${{ inputs.baseurl }}" --index ${{ inputs.index }} --output="${{ inputs.publish_dir }}" --templates-dir="${{ inputs.templates_dir }}"
      shell: bash
